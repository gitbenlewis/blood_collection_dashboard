blood_collection_dash_app:
  title: "Blood Collection Dashboard - Ben Lewis"
  description: "Biomarker collection progress monitor for simulated clinical trial"

  # --- Simulation ---
  num_participants: 100
  participant_id_prefix: "BL_"

  # --- Data ---
  input_datas:
    blood_collection_data:
      is_source: true           # primary dataset; outputs are constrained to collected visits
      label: "Blood collected"
      csv_file_path: "output_files/blood_collected_at_visit.csv"
      participant_id_col: "pseudo_ID"
      values:
        collected: "Blood_collected"
        not_collected: "Not_collected"
      random_seed: 42          # seed used to fill simulated missing data
    blood_collection_output_plasma:
      csv_file_path: "output_files/blood_plasma_processed.csv"
      participant_id_col: "pseudo_ID"
      values:
        collected: "Plasma_processed"
        not_collected: "Not_collected"
      random_seed: 42          # seed used to fill simulated missing data
    blood_collection_output_serum:
      csv_file_path: "output_files/blood_serum_processed.csv"
      participant_id_col: "pseudo_ID"
      values:
        collected: "Serum_processed"
        not_collected: "Not_collected"
      random_seed: 42          # seed used to fill simulated missing data
    blood_collection_output_pbmc:
      csv_file_path: "output_files/blood_pbmc_processed.csv"
      participant_id_col: "pseudo_ID"
      values:
        collected: "PBMC_processed"
        not_collected: "Not_collected"
      random_seed: 42          # seed used to fill simulated missing data 
  

  # --- App server ---
  app:
    host: "0.0.0.0"
    port: 8050
    debug: false

  # --- Colors ---
  colors:
    collected: "#2ecc71"       # green
    not_collected: "#e74c3c"   # red
    background: "#f0f2f5"
    card_bg: "#ffffff"
    header_bg: "#1a1a2e"
    header_text: "#ffffff"
    accent: "#3498db"
    text: "#2c3e50"
    subtext: "#7f8c8d"

  # --- Chart display ---
  charts:
    heatmap_row_height: 14    # px per participant row in heatmap
    heatmap_min_height: 400
    bar_height: 360
    font_family: "Inter, Helvetica Neue, Arial, sans-serif"
    font_size: 13
